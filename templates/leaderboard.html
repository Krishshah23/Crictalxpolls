{% extends 'base.html' %}

{% block content %}
<div class="section-header">
    <div class="section-title">Leaderboard</div>
    <span class="tag">Match winners + season totals</span>
</div>
<div class="card card-pad">
    {% for entry in leaderboard %}
    <div class="rank-row" data-user-modal data-user-name="{{ entry.user.username }}" data-user-username="{{ entry.user.username }}" data-user-points="{{ entry.points }}" data-user-wins="{{ entry.wins }}" data-user-rank="{{ loop.index }}" data-user-history='{{ entry.history|safe }}' data-user-avatar="{{ url_for('static', filename='uploads/avatars/' ~ entry.user.avatar_path) if entry.user.avatar_path else url_for('static', filename='images/avatar-placeholder.svg') }}">
        <div class="rank-num">{{ loop.index }}</div>
        <div class="rank-avatar">
            <img src="{{ url_for('static', filename='uploads/avatars/' ~ entry.user.avatar_path) if entry.user.avatar_path else url_for('static', filename='images/avatar-placeholder.svg') }}" alt="{{ entry.user.username }}" />
        </div>
        <div class="rank-name">{{ entry.user.username }}</div>
        <div style="text-align:right;margin-left:auto">
            <div class="rank-pts">{{ entry.wins }} wins</div>
            <div class="text-xs text-dim">{{ entry.points }} poll pts</div>
            <div class="text-xs text-dim">Streak {{ entry.streak }}</div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
